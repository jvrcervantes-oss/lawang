<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Lawang · Acceso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{ --tg:#485B37; --dl:#104C4F; --va:#2E3437; --ss:#BEB3A5; --rl:#F5F0E6; --muted:#6b6c66; --line:#e4ddcf; }
  *{ box-sizing:border-box; } html,body{ margin:0; height:100%; }
  body{ font-family:'Jost',sans-serif; background:var(--rl); color:var(--va);
    display:grid; place-items:center; min-height:100vh; padding:20px; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:16px; width:100%; max-width:380px;
    padding:32px 28px; box-shadow:0 10px 40px rgba(46,52,55,.08); }
  .brand{ display:flex; flex-direction:column; align-items:center; gap:10px; margin-bottom:24px; }
  .glyph{ width:48px; height:48px; border:1.5px solid var(--tg); border-radius:50%; display:grid; place-items:center;
    color:var(--tg); font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:600; }
  .brand h1{ font-family:'Cormorant Garamond',serif; font-size:20px; letter-spacing:.16em; text-transform:uppercase; margin:0; }
  .brand small{ font-size:10px; letter-spacing:.28em; color:var(--muted); }
  label{ display:block; font-size:12.5px; color:var(--muted); margin:14px 0 5px; }
  input{ width:100%; font-family:inherit; font-size:16px; padding:12px 14px; border:1px solid var(--line);
    border-radius:10px; background:#fdfcf9; }
  input:focus{ outline:none; border-color:var(--tg); box-shadow:0 0 0 3px rgba(72,91,55,.12); }
  button{ width:100%; margin-top:22px; font-family:inherit; font-size:15px; font-weight:500; color:#fff;
    background:var(--dl); border:none; border-radius:10px; padding:13px; cursor:pointer; }
  button:disabled{ background:var(--ss); }
  .err{ color:#a3342b; font-size:13px; margin-top:14px; min-height:18px; text-align:center; }
</style>
</head>
<body>
  <form class="card" id="f">
    <div class="brand">
      <div class="glyph">L</div>
      <h1>Contratos</h1>
      <small>LAWANG TROPICAL PROPERTIES</small>
    </div>
    <label>Email</label>
    <input type="email" id="email" autocomplete="username" required>
    <label>Contraseña</label>
    <input type="password" id="password" autocomplete="current-password" required>
    <button type="submit" id="btn">Entrar</button>
    <div class="err" id="err"></div>
  </form>
<script>
const $=s=>document.querySelector(s);
// si ya hay sesión, ir directo a la app
fetch('api/auth.php?action=me').then(r=>r.json()).then(d=>{ if(d.agent) location.href='app.html'; }).catch(()=>{});
$('#f').addEventListener('submit', async e=>{
  e.preventDefault(); $('#btn').disabled=true; $('#err').textContent='';
  try{
    const r=await fetch('api/auth.php?action=login',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:$('#email').value, password:$('#password').value})
    });
    const d=await r.json();
    if(d.ok){ location.href='app.html'; }
    else{ $('#err').textContent=d.error||'Error'; $('#btn').disabled=false; }
  }catch(_){ $('#err').textContent='No se pudo conectar'; $('#btn').disabled=false; }
});
</script>
</body>
</html>
